<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Digital</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🎲 Sorteador Digital</h1>

    <form method="POST">
        <textarea
            name="itens"
            placeholder="Digite os itens separados por vírgula. Ex: João, Maria, Pedro"
            required></textarea>

        <button type="submit">Sortear</button>
    </form>

    {% if resultado %}
    <div class="resultado">
        <h2>Resultado:</h2>
        <p>{{ resultado }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
